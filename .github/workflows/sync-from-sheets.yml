name: Sync from Google Sheets

on:
  # Triggered by webhook from Google Sheets
  repository_dispatch:
    types: [sheets-updated]

  # Also allow manual trigger from GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Raise ImageMagick resource limits
        # Large TIFFs (e.g. 150+ MB artist photos) abort under ImageMagick's
        # default policy. Relax the resource caps so they convert to JPEG.
        run: |
          for policy in /etc/ImageMagick-*/policy.xml; do
            [ -f "$policy" ] || continue
            echo "Relaxing limits in $policy"
            sudo sed -i -E 's/(name="memory" value=")[^"]*/\14GiB/' "$policy"
            sudo sed -i -E 's/(name="map" value=")[^"]*/\18GiB/' "$policy"
            sudo sed -i -E 's/(name="width" value=")[^"]*/\1200KP/' "$policy"
            sudo sed -i -E 's/(name="height" value=")[^"]*/\1200KP/' "$policy"
            sudo sed -i -E 's/(name="area" value=")[^"]*/\14GP/' "$policy"
            sudo sed -i -E 's/(name="disk" value=")[^"]*/\116GiB/' "$policy"
          done

      - name: Install dependencies
        run: npm ci

      - name: Create service account file
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: echo "$GOOGLE_SERVICE_ACCOUNT" | base64 --decode > service-account.json

      - name: Run sync
        run: npm run sync

      - name: Generate slides
        run: npm run generate-slides

      - name: Clean up service account file
        run: rm service-account.json

      - name: Check for changes
        id: changes
        run: |
          git add -A
          git diff --cached --quiet || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Sync data from Google Sheets

          🤖 Automated sync triggered by Google Sheets update"
          git push
